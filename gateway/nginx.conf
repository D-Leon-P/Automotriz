events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Ocultar la versión de NGINX (Mitiga A05:2021-Security Misconfiguration)
    server_tokens off;

    # Limitar el tamaño de la petición del cliente (Prevención de Denegación de Servicio y subida de archivos maliciosos)
    client_max_body_size 2M;

    # Definición de Rate Limiting para inicio de sesión (A05:2021-Security Misconfiguration y ataques de fuerza bruta)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Habilitar compresión GZIP
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Determinar cabecera Authorization: Priorizar la cabecera original, si no existe usar la cookie auth_token
    map $http_authorization $auth_header {
        default $http_authorization;
        ""      "Bearer $cookie_auth_token";
    }

    server {
        listen 80;
        server_name localhost;

        # ==========================================
        # CABECERAS DE SEGURIDAD GLOBAL (OWASP Hardening)
        # ==========================================
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # Content Security Policy (CSP): Mitigación de XSS Reflejado/Persistente y clickjacking
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost/ ws://localhost/ http://frontend:5173/;" always;

        # ==========================================
        # FILTRO DE SEGURIDAD EN URL (Inyección SQL, XSS, Path Traversal)
        # ==========================================
        if ($request_uri ~* "(\.\./|<script|javascript:|union\s+select|select\s+.*\s+from)") {
            return 403;
        }

        location /api/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://prospects-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth {
            proxy_pass http://prospects-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Token Relay: Inyectar token JWT desde la cookie en la cabecera Authorization
            proxy_set_header Authorization $auth_header;
        }

        # 2. Enrutamiento de Vehículos y Catálogos
        location /api/vehiculos {
            proxy_pass http://prospects-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Token Relay
            proxy_set_header Authorization $auth_header;
        }

        # 3. Microservicio de Prospectos
        location /api/prospectos {
            proxy_pass http://prospects-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Token Relay
            proxy_set_header Authorization $auth_header;
        }

        location /api/roles {
            proxy_pass http://prospects-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $auth_header;
        }

        location /api/empleados {
            proxy_pass http://prospects-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $auth_header;
        }

        location /api/permisos {
            proxy_pass http://prospects-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $auth_header;
        }

        # 4. Microservicio de Ventas
        location /api/ventas {
            proxy_pass http://sales-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Token Relay
            proxy_set_header Authorization $auth_header;
        }

        location /api/clientes {
            proxy_pass http://sales-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $auth_header;
        }

        # 5. Microservicio de Seguros
        location /api/seguros {
            proxy_pass http://insurance-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Token Relay
            proxy_set_header Authorization $auth_header;
        }

        # 6. Microservicio de Dashboard (Métricas)
        location /api/dashboard {
            proxy_pass http://dashboard-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Token Relay
            proxy_set_header Authorization $auth_header;
        }

        # 8. Servidor WebSocket (Tiempo Real)
        location /ws {
            proxy_pass http://websocket-service:6001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 7. Frontend Vue.js (Vite Dev Server) & WebSockets para HMR
        location / {
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Soporte para WebSockets de Vite
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
